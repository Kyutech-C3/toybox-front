name: npm ci setup
description: Set up npm in the GitHub Actions environment

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci
