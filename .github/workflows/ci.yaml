name: pnpm ci setup
description: Set up pnpm in the GitHub Actions environment

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - main

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: "package.json"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Run Ci
        run: npm run ci
